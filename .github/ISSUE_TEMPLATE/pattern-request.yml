name: Pattern request
description: Propose a new pattern guide for the repository.
title: "Pattern request: "
labels:
  - documentation
  - pattern
body:
  - type: input
    id: pattern_name
    attributes:
      label: Pattern name
      placeholder: Strategy
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Choose the closest guide category.
      options:
        - Behavioral
        - Creational
        - Structural
        - Architecture
        - Enterprise
        - Anti-pattern
        - Testing
        - Other
    validations:
      required: true
  - type: textarea
    id: real_world_problem
    attributes:
      label: Real-world problem
      description: Which recurring problem should this pattern help explain?
    validations:
      required: true
  - type: textarea
    id: example_scenario
    attributes:
      label: Example scenario
      description: Give a realistic project situation where this pattern appears.
    validations:
      required: true
  - type: checkboxes
    id: related_patterns
    attributes:
      label: Related patterns
      description: Select common related or competing patterns if relevant.
      options:
        - label: Strategy
        - label: Factory
        - label: Adapter
        - label: Decorator
        - label: Chain of Responsibility
        - label: Command
        - label: State
        - label: Repository
        - label: DTO
        - label: Domain Event
        - label: Specification
        - label: Other or unsure
  - type: textarea
    id: why_add
    attributes:
      label: Why this should be added
      description: Explain why the repository would be more useful with this guide.
    validations:
      required: true
