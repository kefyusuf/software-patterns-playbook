name: Correction
description: Report a factual issue, weak explanation, or consistency problem.
title: "Correction: "
labels:
  - documentation
  - correction
body:
  - type: dropdown
    id: content_area
    attributes:
      label: Content area
      description: Choose the closest affected area.
      options:
        - Introduction
        - Decision guide
        - GoF pattern guide
        - Architecture guide
        - Enterprise pattern guide
        - Real-world scenario
        - Anti-pattern
        - Checklist
        - Example
        - Template or contribution workflow
        - Other
    validations:
      required: true
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      description: Choose the main problem.
      options:
        - Factual issue
        - Weak or unclear explanation
        - Missing trade-off
        - Missing when-not-to-use guidance
        - Inconsistent terminology
        - Example drift
        - Link or navigation issue
        - Other
    validations:
      required: true
  - type: input
    id: file_path
    attributes:
      label: File path
      placeholder: docs/02-gof-patterns/behavioral/strategy.md
    validations:
      required: true
  - type: textarea
    id: current_problem
    attributes:
      label: Current problem
      description: What is incorrect, unclear, or inconsistent?
    validations:
      required: true
  - type: textarea
    id: suggested_correction
    attributes:
      label: Suggested correction
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: supporting_reasoning
    attributes:
      label: Supporting reasoning
      description: Explain why the correction is more accurate or useful.
    validations:
      required: true
